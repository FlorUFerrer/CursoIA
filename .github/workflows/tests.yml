name: Tests & Cobertura

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Tests unitarios e integración ──────────────────────────────────
  unit-tests:
    name: Tests unitarios e integración
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias de producción y desarrollo
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Crear directorio de datos para tests
        run: mkdir -p data

      - name: Ejecutar tests unitarios e integración con cobertura
        run: |
          coverage run -m pytest tests/ \
            --ignore=tests/functional \
            -v \
            --tb=short \
            -p no:warnings
        env:
          DATABASE_URL: sqlite:///./data/test_tcg.db
          DATA_DIR: ./data

      - name: Generar reporte de cobertura en consola
        run: coverage report --show-missing

      - name: Verificar cobertura mínima (60%)
        run: coverage report --fail-under=60

      - name: Exportar cobertura a XML (para Codecov)
        run: coverage xml

      - name: Subir reporte de cobertura a Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Limpiar DB de test
        if: always()
        run: rm -f ./data/test_tcg.db

  # ── Job 2: Tests funcionales con Selenium ─────────────────────────────────
  functional-tests:
    name: Tests funcionales (Selenium)
    runs-on: ubuntu-latest
    needs: unit-tests  # Solo corre si los unit tests pasaron

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Instalar Google Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Crear directorio de datos
        run: mkdir -p data

      - name: Iniciar servidor FastAPI en segundo plano
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Esperando que el servidor esté disponible..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:8000/api/health && echo "Servidor listo." && break
            echo "Intento $i: servidor todavía no disponible, esperando 2s..."
            sleep 2
          done
        env:
          DATABASE_URL: sqlite:///./data/functional_test.db
          DATA_DIR: ./data

      - name: Ejecutar tests funcionales (Selenium)
        run: pytest tests/functional/ -v --tb=short -p no:warnings
        continue-on-error: true  # No bloquea el pipeline si Selenium falla

      - name: Detener servidor
        if: always()
        run: pkill -f uvicorn || true

      - name: Limpiar DB funcional
        if: always()
        run: rm -f ./data/functional_test.db
